services:

  # =========================
  # BACKEND API
  # =========================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chat_with_doc_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
      - torch_cache:/root/.cache/torch
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /app/data/chroma
      SQLITE_URL: sqlite:////app/data/rag.db
      UPLOAD_DIR: /app/data/uploads
    depends_on:
      - redis
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =========================
  # CELERY WORKER
  # =========================
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chat_with_doc_worker
    command: celery -A backend.workers.tasks worker --loglevel=info --concurrency=2
    volumes:
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
      - torch_cache:/root/.cache/torch
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /app/data/chroma
      SQLITE_URL: sqlite:////app/data/rag.db
      UPLOAD_DIR: /app/data/uploads
    depends_on:
      - redis
      - backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =========================
  # REDIS
  # =========================
  redis:
    image: redis:7-alpine
    container_name: chat_with_doc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M

  # =========================
  # POSTGRES (Langfuse DB)
  # =========================
  langfuse-db:
    image: postgres:15
    container_name: langfuse_db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =========================
  # CLICKHOUSE
  # =========================
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: chat_with_doc_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --host 127.0.0.1 --port 9000 --user default --password langfuse --query 'SELECT 1'"
        ]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  # =========================
  # LANGFUSE
  # =========================
  langfuse:
    image: langfuse/langfuse:latest
    container_name: langfuse
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://default:langfuse@clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: langfuse
      NEXTAUTH_SECRET: ACKYQVHAIIXHXGDHONDCOJNOXNTRAENE
      NEXTAUTH_URL: http://localhost:3001
      SALT: PUTTHESECONDONEHERE
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "langfuse-events"
      LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "false"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: "langfuse-media"
      LANGFUSE_INGESTION_QUEUE_PROCESSING_ENABLED: "false"
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: on-failure

# =========================
# VOLUMES
# =========================
volumes:
  redis_data:
  hf_cache:
  torch_cache:
  langfuse_db_data:
  clickhouse_data: